        let filteredProducts = [...PRODUCTOS];
        let currentPriceFilter = 'all';
        
        function updateStats() {
            const total = filteredProducts.length;
            const withPhotos = filteredProducts.filter(p => p['Foto Principal']).length;
            document.getElementById('stats').innerHTML = `📦 ${total} productos | 📸 ${withPhotos} con fotos`;
        }
        
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            if (filteredProducts.length === 0) {
                grid.innerHTML = '<div class="no-results"><h2>😕 No hay productos</h2><p>Intenta con otros filtros</p></div>';
                return;
            }
            grid.innerHTML = filteredProducts.map(p => {
                const foto = p['Foto Principal'] || 'https://via.placeholder.com/300x300?text=Sin+Foto';
                const tags = (p['Todas las Tags'] || '').split(',').slice(0, 3);
                const nombre = p['Nombre'] || '';
                const precio = p['Precio Mínimo'] || '0';
                const tallas = p['Tallas Disponibles'] || 'Consultar';
                const mensaje = encodeURIComponent(`Hola! Me interesa el ${nombre}`);
                return `
                    <div class="product-card">
                        <img src="${foto}" alt="${nombre}" class="product-image" onerror="this.src='https://via.placeholder.com/300x300?text=Sin+Foto'">
                        <div class="product-info">
                            <div class="product-name">${nombre}</div>
                            <div class="product-price">S/. ${precio}</div>
                            <div class="product-tags">${tags.map(tag => `<span class="tag">${tag.trim()}</span>`).join('')}</div>
                            <div class="product-tallas">Tallas: ${tallas}</div>
                            <a href="https://wa.me/51925472563?text=${mensaje}" class="btn-whatsapp" target="_blank">💬 Consultar por WhatsApp</a>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function filterPrice(range) {
            currentPriceFilter = range;
            document.querySelectorAll('.price-filter button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            if (range === 'all') {
                filteredProducts = [...PRODUCTOS];
            } else {
                filteredProducts = PRODUCTOS.filter(p => {
                    const price = parseFloat(p['Precio Mínimo'] || 0);
                    if (range === '0-150') return price <= 150;
                    if (range === '150-200') return price > 150 && price <= 200;
                    if (range === '200-300') return price > 200 && price <= 300;
                    if (range === '300+') return price > 300;
                    return true;
                });
            }
            applySearch();
        }
        
        function applySearch() {
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            if (searchTerm) {
                filteredProducts = filteredProducts.filter(p => 
                    (p['Nombre'] || '').toLowerCase().includes(searchTerm) ||
                    (p['Todas las Tags'] || '').toLowerCase().includes(searchTerm)
                );
            }
            updateStats();
            renderProducts();
        }
        
        document.getElementById('searchBox').addEventListener('input', () => {
            filterPrice(currentPriceFilter);
        });
        
        updateStats();
        renderProducts();
    </script>
