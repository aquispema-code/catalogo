<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👗 Catálogo Mayor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%); 
            padding: 20px; 
            min-height: 100vh; 
        }
        .header { text-align: center; color: white; margin-bottom: 40px; }
        .header h1 { font-size: 3em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .header p { font-size: 1.2em; opacity: 0.9; }
        .back-link { 
            display: inline-block; 
            color: white; 
            text-decoration: none; 
            margin-bottom: 20px; 
            padding: 10px 20px; 
            background: rgba(255,255,255,0.2); 
            border-radius: 8px; 
        }
        .back-link:hover { background: rgba(255,255,255,0.3); }
        .stats { 
            background: rgba(255,255,255,0.2); 
            padding: 15px; 
            border-radius: 10px; 
            text-align: center; 
            color: white; 
            margin-bottom: 30px; 
            max-width: 1200px; 
            margin-left: auto; 
            margin-right: auto; 
        }
        .filters { 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            margin-bottom: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            max-width: 1200px; 
            margin-left: auto; 
            margin-right: auto; 
        }
        .search-box { 
            width: 100%; 
            padding: 15px; 
            font-size: 1.1em; 
            border: 2px solid #667eea; 
            border-radius: 10px; 
            margin-bottom: 15px; 
        }
        .price-filter { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .price-filter button { 
            padding: 10px 20px; 
            background: #667eea; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: all 0.3s; 
        }
        .price-filter button:hover { background: #5568d3; transform: translateY(-2px); }
        .price-filter button.active { background: #764ba2; }
        .products-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 25px; 
            max-width: 1200px; 
            margin: 0 auto 40px; 
        }
        .product-card { 
            background: white; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            transition: transform 0.3s, box-shadow 0.3s; 
            cursor: pointer; 
        }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .product-image { width: 100%; height: 300px; object-fit: cover; background: #f5f5f5; }
        .product-info { padding: 20px; }
        .product-name { font-size: 1.3em; font-weight: bold; color: #333; margin-bottom: 10px; min-height: 60px; }
        .product-price { font-size: 1.8em; color: #667eea; font-weight: bold; margin-bottom: 10px; }
        .product-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; min-height: 70px; }
        .tag { background: #f0f0f0; padding: 5px 12px; border-radius: 15px; font-size: 0.85em; color: #666; }
        .product-tallas { color: #666; font-size: 0.9em; margin-bottom: 15px; }
        .btn-whatsapp { 
            display: block; 
            width: 100%; 
            padding: 12px; 
            background: #25D366; 
            color: white; 
            text-align: center; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold; 
            transition: all 0.3s; 
        }
        .btn-whatsapp:hover { background: #1fb855; }
        .no-results { 
            text-align: center; 
            padding: 60px 20px; 
            background: white; 
            border-radius: 15px; 
            color: #666; 
            max-width: 600px; 
            margin: 0 auto; 
        }
        @media (max-width: 768px) { 
            .header h1 { font-size: 2em; } 
            .products-grid { grid-template-columns: 1fr; } 
        }
    </style>
</head>

        let filteredProducts = [...PRODUCTOS];
        let currentPriceFilter = 'all';
        
        function updateStats() {
            const total = filteredProducts.length;
            const withPhotos = filteredProducts.filter(p => p['Foto Principal']).length;
            document.getElementById('stats').innerHTML = `📦 ${total} productos | 📸 ${withPhotos} con fotos`;
        }
        
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            if (filteredProducts.length === 0) {
                grid.innerHTML = '<div class="no-results"><h2>😕 No hay productos</h2><p>Intenta con otros filtros</p></div>';
                return;
            }
            grid.innerHTML = filteredProducts.map(p => {
                const foto = p['Foto Principal'] || 'https://via.placeholder.com/300x300?text=Sin+Foto';
                const tags = (p['Todas las Tags'] || '').split(',').slice(0, 3);
                const nombre = p['Nombre'] || '';
                const precio = p['Precio Mínimo'] || '0';
                const tallas = p['Tallas Disponibles'] || 'Consultar';
                const mensaje = encodeURIComponent(`Hola! Me interesa el ${nombre}`);
                return `
                    <div class="product-card">
                        <img src="${foto}" alt="${nombre}" class="product-image" onerror="this.src='https://via.placeholder.com/300x300?text=Sin+Foto'">
                        <div class="product-info">
                            <div class="product-name">${nombre}</div>
                            <div class="product-price">S/. ${precio}</div>
                            <div class="product-tags">${tags.map(tag => `<span class="tag">${tag.trim()}</span>`).join('')}</div>
                            <div class="product-tallas">Tallas: ${tallas}</div>
                            <a href="https://wa.me/51925472563?text=${mensaje}" class="btn-whatsapp" target="_blank">💬 Consultar por WhatsApp</a>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function filterPrice(range) {
            currentPriceFilter = range;
            document.querySelectorAll('.price-filter button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            if (range === 'all') {
                filteredProducts = [...PRODUCTOS];
            } else {
                filteredProducts = PRODUCTOS.filter(p => {
                    const price = parseFloat(p['Precio Mínimo'] || 0);
                    if (range === '0-150') return price <= 150;
                    if (range === '150-200') return price > 150 && price <= 200;
                    if (range === '200-300') return price > 200 && price <= 300;
                    if (range === '300+') return price > 300;
                    return true;
                });
            }
            applySearch();
        }
        
        function applySearch() {
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            if (searchTerm) {
                filteredProducts = filteredProducts.filter(p => 
                    (p['Nombre'] || '').toLowerCase().includes(searchTerm) ||
                    (p['Todas las Tags'] || '').toLowerCase().includes(searchTerm)
                );
            }
            updateStats();
            renderProducts();
        }
        
        document.getElementById('searchBox').addEventListener('input', () => {
            filterPrice(currentPriceFilter);
        });
        
        updateStats();
        renderProducts();
    </script>
