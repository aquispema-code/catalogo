<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogos Waruna</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }
    h1 {
      color: white;
      font-size: 3em;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    p {
      color: rgba(255,255,255,0.9);
      font-size: 1.2em;
      margin-bottom: 40px;
    }
    .catalogs {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .catalog-btn {
      display: block;
      padding: 25px;
      border-radius: 15px;
      text-decoration: none;
      color: white;
      font-size: 1.3em;
      font-weight: bold;
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .catalog-btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }
    .tematico { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .bautizo { background: linear-gradient(135deg, #a8e6cf 0%, #56ab2f 100%); }
    .mayor { background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%); }
  </style>
</head>
<body>
  <div class="container">
    <h1>👗 Waruna</h1>
    <p>Vestidos y Tutus para Niñas</p>
    <div class="catalogs">
      <a href="/tematico" class="catalog-btn tematico">🎨 Catálogo Temático</a>
      <a href="/bautizo" class="catalog-btn bautizo">👼 Catálogo Bautizo</a>
      <a href="/mayor" class="catalog-btn mayor">👗 Catálogo Mayor</a>
    </div>
  </div>
</body>
</html>
