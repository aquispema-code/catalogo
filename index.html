<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waruna - Catálogos de Vestidos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 800px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            font-size: 3em;
            color: #667eea;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 50px;
        }
        .catalogos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }
        .catalogo-link {
            display: block;
            padding: 40px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 15px;
            transition: all 0.3s;
            font-size: 1.2em;
            font-weight: bold;
        }
        .catalogo-link:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.4);
        }
        .catalogo-link .emoji {
            font-size: 3em;
            display: block;
            margin-bottom: 15px;
        }
        .footer {
            margin-top: 50px;
            font-size: 0.9em;
            color: #999;
        }
        .footer a {
            color: #667eea;
            text-decoration: none;
        }
        @media (max-width: 768px) {
            h1 { font-size: 2em; }
            .container { padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎀 Waruna</h1>
        <p class="subtitle">Vestidos & Tutus para ocasiones especiales</p>
        
        <div class="catalogos">
            <a href="tematico.html" class="catalogo-link">
                <span class="emoji">🎨</span>
                Vestidos Temáticos
            </a>
            <a href="bautizo.html" class="catalogo-link">
                <span class="emoji">👼</span>
                Vestidos de Bautizo
            </a>
            <a href="mayor.html" class="catalogo-link">
                <span class="emoji">👗</span>
                Vestidos por Mayor
            </a>
        </div>
        
        <div class="footer">
            📱 WhatsApp: <a href="https://wa.me/51925472563" target="_blank">+51 925 472 563</a>
        </div>
    </div>
</body>
</html>
